<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Speed - Le Jeu</title>
    <!-- Importation d'une police futuriste depuis Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    
    <style>
        /* Styles Généraux */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        /* Conteneur principal */
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #0c0c14;
            border: 4px solid #00f2fe;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            overflow: hidden;
        }

        /* Écrans (Menu, Jeu, etc.) */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease-in-out;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        /* Style du Titre */
        .game-title {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f, 0 0 40px #ff007f;
            margin-bottom: 50px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f; }
            to { transform: scale(1.03); text-shadow: 0 0 15px #ff007f, 0 0 30px #ff007f, 0 0 50px #ff007f; }
        }

        /* Groupe de Boutons */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        /* Style des Boutons */
        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: #00f2fe;
            background: transparent;
            padding: 15px 20px;
            border: 2px solid #00f2fe;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 0 rgba(0, 242, 254, 0);
        }

        .btn:hover {
            color: #fff;
            background-color: #00f2fe;
            box-shadow: 0 0 15px #00f2fe, inset 0 0 10px rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
        }

        /* Bouton Quitter/Retour différent */
        .btn-secondary {
            border-color: #ff007f;
            color: #ff007f;
        }

        .btn-secondary:hover {
            background-color: #ff007f;
            box-shadow: 0 0 15px #ff007f;
        }

        /* Fenêtre de texte pour les sections */
        .panel-text {
            font-size: 1rem;
            color: #a0a0ca;
            margin-bottom: 40px;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div id="game-container">

        <!-- ÉCRAN: MENU PRINCIPAL -->
        <div id="main-menu" class="screen">
            <h1 class="game-title">Neon Speed</h1>
            <div class="menu-buttons">
                <button class="btn" onclick="switchScreen('game-screen')">Jouer</button>
                <button class="btn" onclick="switchScreen('settings-screen')">Paramètres</button>
                <button class="btn" onclick="switchScreen('controls-screen')">Commandes</button>
            </div>
        </div>

        <!-- ÉCRAN: JEU (Zone temporaire) -->
        <div id="game-screen" class="screen hidden">
            <h1 class="game-title" style="text-shadow: 0 0 10px #00f2fe;">En Course...</h1>
            <p class="panel-text">Ici, nous allons bientôt coder la route et la voiture !</p>
            <div class="menu-buttons">
                <button class="btn btn-secondary" onclick="switchScreen('main-menu')">Retour au menu</button>
            </div>
        </div>

        <!-- ÉCRAN: PARAMÈTRES -->
        <div id="settings-screen" class="screen hidden">
            <h1 class="game-title">Paramètres</h1>
            <p class="panel-text">Options audio, choix de la musique et graphismes à venir.</p>
            <div class="menu-buttons">
                <button class="btn btn-secondary" onclick="switchScreen('main-menu')">Retour</button>
            </div>
        </div>

        <!-- ÉCRAN: COMMANDES -->
        <div id="controls-screen" class="screen hidden">
            <h1 class="game-title">Commandes</h1>
            <p class="panel-text">
                Utilise les flèches directionnelles <br> 
                <strong>Gauche (◀)</strong> et <strong>Droite (▶)</strong> <br> 
                pour diriger ton véhicule et esquiver les obstacles.
            </p>
            <div class="menu-buttons">
                <button class="btn btn-secondary" onclick="switchScreen('main-menu')">Retour</button>
            </div>
        </div>

    </div>

    <!-- Logique JavaScript pour naviguer entre les écrans -->
    <script>
        function switchScreen(screenId) {
            // On cache d'abord tous les écrans
            const screens = document.querySelectorAll('.screen');
            screens.forEach(screen => {
                screen.classList.add('hidden');
            });

            // On affiche uniquement l'écran demandé
            document.getElementById(screenId).classList.remove('hidden');
        }
    </script>

</body>
</html>
