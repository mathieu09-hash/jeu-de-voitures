<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Horizon 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    
    <!-- On importe la bibliothèque 3D Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #0a0a12;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 1000px;
            height: 700px;
            background-color: #0c0c14;
            border: 4px solid #00f2fe;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            overflow: hidden;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease-in-out;
            z-index: 2;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
        }

        .game-title {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            margin-bottom: 50px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: #00f2fe;
            background: transparent;
            padding: 15px 20px;
            border: 2px solid #00f2fe;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            color: #fff;
            background-color: #00f2fe;
            box-shadow: 0 0 15px #00f2fe;
            transform: translateY(-3px);
        }

        .btn-secondary {
            border-color: #ff007f;
            color: #ff007f;
        }

        .btn-secondary:hover {
            background-color: #ff007f;
            box-shadow: 0 0 15px #ff007f;
        }

        /* Interface du jeu 3D */
        #game-screen {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: #00f2fe;
            text-shadow: 0 0 5px #00f2fe;
            pointer-events: none;
            background: rgba(12, 12, 20, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #00f2fe;
            z-index: 3;
        }

        .back-hud {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 3;
        }
    </style>
</head>
<body>

    <div id="game-container">

        <!-- MENU PRINCIPAL -->
        <div id="main-menu" class="screen">
            <h1 class="game-title">Neon Horizon</h1>
            <div class="menu-buttons">
                <button class="btn" onclick="switchScreen('game-screen')">Piloter (3D)</button>
                <button class="btn" onclick="switchScreen('controls-screen')">Commandes</button>
            </div>
        </div>

        <!-- ZONE DE JEU 3D -->
        <div id="game-screen" class="screen hidden">
            <div class="hud">Vitesse: <span id="speed-display">0</span> km/h</div>
            <div class="back-hud">
                <button class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;" onclick="stopGame()">Menu</button>
            </div>
            <!-- C'est ici que Three.js va injecter le monde en 3D -->
            <div id="canvas3d"></div>
        </div>

        <!-- COMMANDES -->
        <div id="controls-screen" class="screen hidden">
            <h1 class="game-title">Commandes</h1>
            <p style="text-align: center; line-height: 2; color: #a0a0ca; margin-bottom: 30px; font-size: 1.1rem;">
                ▲ Accélérer | ▼ Freiner / Reculer<br>
                ◀ Tourner à Gauche | ▶ Tourner à Droite
            </p>
            <div class="menu-buttons">
                <button class="btn btn-secondary" onclick="switchScreen('main-menu')">Retour</button>
            </div>
        </div>

    </div>

    <script>
        let scene, camera, renderer, gameLoopId;
        let car, carBody;
        let obstacles = [];
        
        // Physique de la voiture
        let physics = {
            speed: 0,
            maxSpeed: 0.8,
            backSpeed: -0.2,
            accel: 0.01,
            decel: 0.005,
            friction: 0.003,
            turnSpeed: 0.03,
            angle: 0
        };

        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            
            if (screenId === 'game-screen') {
                init3DGame();
            }
        }

        function init3DGame() {
            const container = document.getElementById('canvas3d');
            container.innerHTML = ""; // On nettoie si besoin

            // 1. CRÉATION DE LA SCÈNE ET DE LA CAMÉRA
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#05050a');
            scene.fog = new THREE.FogExp2('#05050a', 0.015); // Effet de brume au loin

            camera = new THREE.PerspectiveCamera(60, 1000 / 700, 0.1, 1000);

            // 2. LE MOTEUR DE RENDU
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(1000, 700);
            container.appendChild(renderer.domElement);

            // 3. LES LUMIÈRES
            const ambientLight = new THREE.AmbientLight('#ffffff', 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight('#00f2fe', 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 4. LE DECOR : Un sol immense avec grille néon
            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.MeshBasicMaterial({ color: '#080812' }); // Corrigé ici avec des guillemets !
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2; // On le couche à plat
            scene.add(ground);

            const gridHelper = new THREE.GridHelper(2000, 100, '#00f2fe', '#151525');
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            // 5. LA VOITURE (Assemblage de blocs 3D)
            car = new THREE.Group();
            
            // Châssis principal
            const bodyGeo = new THREE.BoxGeometry(2, 0.6, 4);
            const bodyMat = new THREE.MeshPhongMaterial({ color: '#00f2fe', emissive: '#004455' });
            carBody = new THREE.Mesh(bodyGeo, bodyMat);
            carBody.position.y = 0.4;
            car.add(carBody);

            // Habitacle (Cockpit)
            const cabinGeo = new THREE.BoxGeometry(1.6, 0.5, 1.8);
            const cabinMat = new THREE.MeshPhongMaterial({ color: '#0c0c14' });
            const cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 0.8, -0.2);
            car.add(cabin);

            // Phares néons avant
            const lightGeo = new THREE.BoxGeometry(0.3, 0.1, 0.1);
            const lightMat = new THREE.MeshBasicMaterial({ color: '#ffff00' });
            const leftLight = new THREE.Mesh(lightGeo, lightMat);
            leftLight.position.set(-0.7, 0.4, 2);
            const rightLight = leftLight.clone();
            rightLight.position.x = 0.7;
            car.add(leftLight, rightLight);

            scene.add(car);
            car.position.set(0, 0, 0);

            // 6. LES CARTES / DÉCORS (Génération de buildings 3D autour)
            obstacles = [];
            for(let i=0; i<100; i++) {
                const h = Math.random() * 30 + 10;
                const w = Math.random() * 10 + 5;
                const obsGeo = new THREE.BoxGeometry(w, h, w);
                const obsMat = new THREE.MeshPhongMaterial({ 
                    color: '#090910', 
                    emissive: Math.random() > 0.5 ? '#ff007f' : '#00f2fe',
                    wireframe: false
                });
                const building = new THREE.Mesh(obsGeo, obsMat);
                
                // Placement aléatoire sur la map (en évitant le centre de départ)
                let rx = (Math.random() - 0.5) * 600;
                let rz = (Math.random() - 0.5) * 600;
                if (Math.abs(rx) < 20) rx += 40;
                if (Math.abs(rz) < 20) rz += 40;

                building.position.set(rx, h/2, rz);
                scene.add(building);
            }

            animate();
        }

        function updatePhysics() {
            // Accélération / Freinage
            if (keys['ArrowUp']) {
                if (physics.speed < physics.maxSpeed) physics.speed += physics.accel;
            } else if (keys['ArrowDown']) {
                if (physics.speed > physics.backSpeed) physics.speed -= physics.accel;
            } else {
                if (physics.speed > 0) physics.speed -= physics.friction;
                if (physics.speed < 0) physics.speed += physics.friction;
                if (Math.abs(physics.speed) < 0.005) physics.speed = 0;
            }

            // Direction (Braquage réaliste proportionnel à la vitesse)
            if (Math.abs(physics.speed) > 0.02) {
                const currentTurn = physics.speed > 0 ? physics.turnSpeed : -physics.turnSpeed;
                if (keys['ArrowLeft']) physics.angle += currentTurn;
                if (keys['ArrowRight']) physics.angle -= currentTurn;
            }

            // Application des mouvements selon l'angle de la voiture
            car.position.x += Math.sin(physics.angle) * physics.speed;
            car.position.z += Math.cos(physics.angle) * physics.speed;
            
            // Rotation visuelle de la voiture
            car.rotation.y = physics.angle;

            // Affichage ATH de la vitesse
            document.getElementById('speed-display').innerText = Math.round(Math.abs(physics.speed) * 300);
        }

        function updateCamera() {
            // LOGIQUE DE LA CAMÉRA POURSUITE (Style Forza/GTA)
            const backX = car.position.x - Math.sin(physics.angle) * 12;
            const backZ = car.position.z - Math.cos(physics.angle) * 12;
            const targetY = car.position.y + 4;

            // Effet d'amorti fluide (Lerp)
            camera.position.x += (backX - camera.position.x) * 0.1;
            camera.position.z += (backZ - camera.position.z) * 0.1;
            camera.position.y += (targetY - camera.position.y) * 0.1;

            camera.lookAt(new THREE.Vector3(car.position.x, car.position.y + 1, car.position.z));
        }

        function animate() {
            gameLoopId = requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            renderer.render(scene, camera);
        }

        function stopGame() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            switchScreen('main-menu');
        }
    </script>
</body>
</html>
