<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Horizon 3D - Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #0f141d;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }
        #game-container {
            position: relative;
            width: 1000px;
            height: 700px;
            border: 4px solid #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        .screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 0.3s ease-in-out;
            z-index: 2;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .game-title {
            font-size: 4rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 50px;
        }
        .menu-buttons { display: flex; flex-direction: column; gap: 20px; width: 300px; }
        .btn {
            font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
            color: #ffffff; background: #1a2332;
            padding: 15px 20px; border: 2px solid #ffffff;
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn:hover { color: #1a2332; background-color: #ffffff; transform: translateY(-3px); }
        .btn-secondary { background: #3a1c1c; border-color: #ff4444; color: #ff4444; }
        .btn-secondary:hover { background-color: #ff4444; color: #fff; }
        #game-screen { position: absolute; width: 100%; height: 100%; }
        #canvas3d { width: 100%; height: 100%; display: block; }
        .hud {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.5rem; color: #ffffff;
            background: rgba(26, 35, 50, 0.85); padding: 15px;
            border-radius: 8px; border: 2px solid #ffffff; z-index: 3;
        }
        .back-hud { position: absolute; top: 20px; right: 20px; z-index: 3; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="main-menu" class="screen">
            <h1 class="game-title">Open Horizon</h1>
            <div class="menu-buttons">
                <button class="btn" onclick="switchScreen('game-screen')">Piloter (3D)</button>
                <button class="btn" onclick="switchScreen('controls-screen')">Commandes</button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="hud">Vitesse: <span id="speed-display">0</span> km/h</div>
            <div class="back-hud">
                <button class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;" onclick="stopGame()">Menu</button>
            </div>
            <div id="canvas3d"></div>
        </div>

        <div id="controls-screen" class="screen hidden">
            <h1 class="game-title">Commandes</h1>
            <p style="text-align: center; line-height: 2; color: #a0a0ca; margin-bottom: 30px; font-size: 1.1rem;">
                ▲ Accélérer | ▼ Freiner / Reculer<br>
                ◀ Tourner à Gauche | ▶ Tourner à Droite
            </p>
            <div class="menu-buttons">
                <button class="btn btn-secondary" onclick="switchScreen('main-menu')">Retour</button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, gameLoopId;
        let car;
        let obstacles = [];
        
        let physics = {
            speed: 0, maxSpeed: 1.4, backSpeed: -0.3,
            accel: 0.018, decel: 0.012, friction: 0.006,
            turnSpeed: 0.038, angle: 0,
            width: 2.2, length: 4.2
        };

        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            if (screenId === 'game-screen') init3DGame();
        }

        function init3DGame() {
            const container = document.getElementById('canvas3d');
            container.innerHTML = "";

            scene = new THREE.Scene();
            
            // COULEUR DU CIEL (Bleu azur lumineux)
            scene.background = new THREE.Color('#87CEEB');
            // Brume atmosphérique claire pour simuler l'horizon
            scene.fog = new THREE.FogExp2('#d8e7ff', 0.008);

            camera = new THREE.PerspectiveCamera(60, 1000 / 700, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(1000, 700);
            container.appendChild(renderer.domElement);

            // LUMIÈRE DU SOLEIL (Blanche et forte)
            let sunLight = new THREE.DirectionalLight('#ffffff', 1.2);
            sunLight.position.set(40, 60, 20);
            scene.add(sunLight);

            // Lumière ambiante (Teinte chaude pour déboucher les ombres)
            scene.add(new THREE.AmbientLight('#fff3e0', 0.5));

            // 1. LE SOL EN HERBE (Vert nature)
            let groundGeo = new THREE.PlaneGeometry(3000, 3000);
            let groundMat = new THREE.MeshPhongMaterial({ color: '#45a247', roughness: 0.9 });
            let ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 2. LA ROUTE EN ASPHALTE (Gris foncé réaliste)
            let roadGeo = new THREE.PlaneGeometry(40, 3000);
            let roadMat = new THREE.MeshPhongMaterial({ color: '#2c2c35', roughness: 0.7 });
            let road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.01;
            scene.add(road);

            // Lignes blanches continues sur les bords extérieures de la route
            for (let side of [-19.5, 19.5]) {
                let lineGeo = new THREE.PlaneGeometry(0.5, 3000);
                let lineMat = new THREE.MeshBasicMaterial({ color: '#ffffff' });
                let line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(side, 0.02, 0);
                scene.add(line);
            }

            // Lignes pointillées centrales (Séparation des voies - Blanches)
            for (let z = -1500; z < 1500; z += 25) {
                let dashGeo = new THREE.PlaneGeometry(0.4, 8);
                let dashMat = new THREE.MeshBasicMaterial({ color: '#ffffff' });
                let dash = new THREE.Mesh(dashGeo, dashMat);
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(0, 0.02, z);
                scene.add(dash);
            }

            // 3. LA VOITURE DE SPORT (Rouge Vif)
            car = new THREE.Group();
            
            // Carrosserie rouge brillante
            let bodyGeo = new THREE.BoxGeometry(2, 0.6, 4);
            let bodyMat = new THREE.MeshPhongMaterial({ color: '#e53935', shininess: 100 });
            let carBody = new THREE.Mesh(bodyGeo, bodyMat);
            carBody.position.y = 0.5;
            car.add(carBody);

            // Toit / Vitres teintées sombres
            let cabinGeo = new THREE.BoxGeometry(1.6, 0.5, 2);
            let cabinMat = new THREE.MeshPhongMaterial({ color: '#1a1a24', shininess: 80 });
            let cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 0.9, -0.2);
            car.add(cabin);

            // Phares Xenon blancs à l'avant
            let lightGeo = new THREE.BoxGeometry(0.3, 0.1, 0.1);
            let lightMat = new THREE.MeshBasicMaterial({ color: '#ffffff' });
            let leftLight = new THREE.Mesh(lightGeo, lightMat);
            leftLight.position.set(-0.7, 0.45, 2.01);
            let rightLight = leftLight.clone();
            rightLight.position.x = 0.7;
            car.add(leftLight, rightLight);

            // Phares arrière de freinage (Rouges)
            let tailLightGeo = new THREE.BoxGeometry(0.4, 0.1, 0.1);
            let tailLightMat = new THREE.MeshBasicMaterial({ color: '#ff0000' });
            let leftTail = new THREE.Mesh(tailLightGeo, tailLightMat);
            leftTail.position.set(-0.7, 0.5, -2.01);
            let rightTail = leftTail.clone();
            rightTail.position.x = 0.7;
            car.add(leftTail, rightTail);

            // 4 Roues en caoutchouc noir
            let wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 24);
            let wheelMat = new THREE.MeshPhongMaterial({ color: '#15151c', roughness: 0.9 });
            wheelGeo.rotateZ(Math.PI / 2);

            let wheelPositions = [
                [-1.05, 0.45, 1.2],  // AVG
                [1.05, 0.45, 1.2],   // AVD
                [-1.05, 0.45, -1.2], // ARG
                [1.05, 0.45, -1.2]   // ARD
            ];

            wheelPositions.forEach(pos => {
                let wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(pos[0], pos[1], pos[2]);
                car.add(wheel);
            });

            scene.add(car);
            car.position.set(0, 0, 0);

            // 4. GENERATION DU DECOR RECONSTRUIT (Immeubles réalistes + Arbres)
            obstacles = [];
            let buildingColors = ['#cfd8dc', '#b0bec5', '#90a4ae', '#d7ccc8', '#f5f5f5'];

            for (let i = 0; i < 120; i++) {
                let side = Math.random() > 0.5 ? 1 : -1;
                // Aligné le long des trottoirs de la route
                let rx = side * (Math.random() * 60 + 24); 
                let rz = (Math.random() - 0.5) * 2200;

                if (Math.random() > 0.4) {
                    // C'EST UN IMMEUBLE MODERNE
                    let h = Math.random() * 25 + 10;
                    let w = Math.random() * 10 + 8;
                    let obsGeo = new THREE.BoxGeometry(w, h, w);
                    let randomColor = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                    let obsMat = new THREE.MeshPhongMaterial({ color: randomColor, roughness: 0.5 });
                    let building = new THREE.Mesh(obsGeo, obsMat);
                    building.position.set(rx, h/2, rz);
                    scene.add(building);

                    obstacles.push({ x: rx, z: rz, halfW: w / 2, halfD: w / 2 });
                } else {
                    // C'EST UN ARBRE EN 3D
                    let tree = new THREE.Group();
                    
                    // Tronc en bois
                    let trunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 3, 8);
                    let trunkMat = new THREE.MeshPhongMaterial({ color: '#5c4033' });
                    let trunk = new THREE.Mesh(trunkGeo, trunkMat);
                    trunk.position.y = 1.5;
                    tree.add(trunk);

                    // Feuillage vert (Cône)
                    let foliageGeo = new THREE.ConeGeometry(2, 4, 8);
                    let foliageMat = new THREE.MeshPhongMaterial({ color: '#2e7d32', roughness: 0.9 });
                    let foliage = new THREE.Mesh(foliageGeo, foliageMat);
                    foliage.position.y = 4;
                    tree.add(foliage);

                    tree.position.set(rx, 0, rz);
                    scene.add(tree);

                    // Zone de collision de l'arbre
                    obstacles.push({ x: rx, z: rz, halfW: 0.8, halfD: 0.8 });
                }
            }

            animate();
        }

        function checkCollisions() {
            let carHalfW = physics.width / 2;
            let carHalfL = physics.length / 2;

            obstacles.forEach(obs => {
                if (Math.abs(car.position.x - obs.x) < (carHalfW + obs.halfW) &&
                    Math.abs(car.position.z - obs.z) < (carHalfL + obs.halfD)) {
                    
                    // Rebond physique réaliste
                    physics.speed = -physics.speed * 0.35;

                    // Repousser le véhicule pour le sortir de la boîte de collision
                    car.position.x -= Math.sin(physics.angle) * 0.5;
                    car.position.z -= Math.cos(physics.angle) * 0.5;
                }
            });
        }

        function updatePhysics() {
            if (keys['ArrowUp']) {
                if (physics.speed < physics.maxSpeed) physics.speed += physics.accel;
            } else if (keys['ArrowDown']) {
                if (physics.speed > physics.backSpeed) physics.speed -= physics.accel;
            } else {
                if (physics.speed > 0) physics.speed -= physics.friction;
                if (physics.speed < 0) physics.speed += physics.friction;
                if (Math.abs(physics.speed) < 0.005) physics.speed = 0;
            }

            if (Math.abs(physics.speed) > 0.02) {
                const currentTurn = physics.speed > 0 ? physics.turnSpeed : -physics.turnSpeed;
                if (keys['ArrowLeft']) physics.angle += currentTurn;
                if (keys['ArrowRight']) physics.angle -= currentTurn;
            }

            car.position.x += Math.sin(physics.angle) * physics.speed;
            car.position.z += Math.cos(physics.angle) * physics.speed;
            car.rotation.y = physics.angle;

            checkCollisions();

            document.getElementById('speed-display').innerText = Math.round(Math.abs(physics.speed) * 190);
        }

        function updateCamera() {
            // Caméra de poursuite fluide
            const backX = car.position.x - Math.sin(physics.angle) * 11;
            const backZ = car.position.z - Math.cos(physics.angle) * 11;
            const targetY = car.position.y + 3.2;

            camera.position.x += (backX - camera.position.x) * 0.07;
            camera.position.z += (backZ - camera.position.z) * 0.07;
            camera.position.y += (targetY - camera.position.y) * 0.07;

            camera.lookAt(new THREE.Vector3(car.position.x, car.position.y + 0.6, car.position.z));
        }

        function animate() {
            gameLoopId = requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            renderer.render(scene, camera);
        }

        function stopGame() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            switchScreen('main-menu');
        }
    </script>
</body>
</html>
