<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon City Horizon 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Orbitron', sans-serif;
            background: #05050a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }
        #game-container {
            position: relative;
            width: 1000px;
            height: 700px;
            border: 4px solid #00f2fe;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.3);
            overflow: hidden;
        }
        .screen {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: all 0.3s ease-in-out;
            z-index: 2;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }
        .game-title {
            font-size: 4rem; font-weight: 900;
            text-transform: uppercase; letter-spacing: 4px;
            text-shadow: 0 0 10px #ff007f, 0 0 20px #ff007f;
            margin-bottom: 50px;
        }
        .menu-buttons { display: flex; flex-direction: column; gap: 20px; width: 300px; }
        .btn {
            font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
            color: #00f2fe; background: transparent;
            padding: 15px 20px; border: 2px solid #00f2fe;
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn:hover { color: #fff; background-color: #00f2fe; box-shadow: 0 0 15px #00f2fe; transform: translateY(-3px); }
        .btn-secondary { border-color: #ff007f; color: #ff007f; }
        .btn-secondary:hover { background-color: #ff007f; box-shadow: 0 0 15px #ff007f; }
        #game-screen { position: absolute; width: 100%; height: 100%; }
        #canvas3d { width: 100%; height: 100%; display: block; }
        .hud {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.5rem; color: #00f2fe; text-shadow: 0 0 5px #00f2fe;
            background: rgba(12, 12, 20, 0.8); padding: 15px;
            border-radius: 8px; border: 2px solid #00f2fe; z-index: 3;
        }
        .back-hud { position: absolute; top: 20px; right: 20px; z-index: 3; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="main-menu" class="screen">
            <h1 class="game-title">Neon Horizon</h1>
            <div class="menu-buttons">
                <button class="btn" onclick="switchScreen('game-screen')">Piloter (3D)</button>
                <button class="btn" onclick="switchScreen('controls-screen')">Commandes</button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="hud">Vitesse: <span id="speed-display">0</span> km/h</div>
            <div class="back-hud">
                <button class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;" onclick="stopGame()">Menu</button>
            </div>
            <div id="canvas3d"></div>
        </div>

        <div id="controls-screen" class="screen hidden">
            <h1 class="game-title">Commandes</h1>
            <p style="text-align: center; line-height: 2; color: #a0a0ca; margin-bottom: 30px; font-size: 1.1rem;">
                ▲ Accélérer | ▼ Freiner / Reculer<br>
                ◀ Tourner à Gauche | ▶ Tourner à Droite
            </p>
            <div class="menu-buttons">
                <button class="btn btn-secondary" onclick="switchScreen('main-menu')">Retour</button>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, gameLoopId;
        let car;
        let obstacles = [];
        
        let physics = {
            speed: 0, maxSpeed: 1.2, backSpeed: -0.3,
            accel: 0.015, decel: 0.01, friction: 0.005,
            turnSpeed: 0.035, angle: 0,
            width: 2.2, length: 4.2 // Dimensions de la hitbox de la voiture
        };

        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            if (screenId === 'game-screen') init3DGame();
        }

        function init3DGame() {
            const container = document.getElementById('canvas3d');
            container.innerHTML = "";

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#030308');
            scene.fog = new THREE.FogExp2('#030308', 0.01);

            camera = new THREE.PerspectiveCamera(60, 1000 / 700, 0.1, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(1000, 700);
            container.appendChild(renderer.domElement);

            // LUMIÈRES
            scene.add(new THREE.AmbientLight('#ffffff', 0.3));
            let dirLight = new THREE.DirectionalLight('#ff007f', 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // 1. LE SOL GLOBAL (Herbe/Fond sombre)
            let groundGeo = new THREE.PlaneGeometry(3000, 3000);
            let groundMat = new THREE.MeshPhongMaterial({ color: '#05050d' });
            let ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // 2. LA ROUTE EN ASPHALTE (Une immense ligne droite centrale de 40m de large)
            let roadGeo = new THREE.PlaneGeometry(40, 3000);
            let roadMat = new THREE.MeshPhongMaterial({ color: '#101018', roughness: 0.8 });
            let road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = 0.01; // Juste au-dessus du sol pour éviter les bugs d'affichage
            scene.add(road);

            // Lignes de délimitation de la route (blanches sur les côtés)
            for (let side of [-19.5, 19.5]) {
                let lineGeo = new THREE.PlaneGeometry(0.4, 3000);
                let lineMat = new THREE.MeshBasicMaterial({ color: '#ffffff' });
                let line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(side, 0.02, 0);
                scene.add(line);
            }

            // Lignes pointillées au milieu (Jaunes)
            for (let z = -1500; z < 1500; z += 30) {
                let dashGeo = new THREE.PlaneGeometry(0.3, 12);
                let dashMat = new THREE.MeshBasicMaterial({ color: '#ffcc00' });
                let dash = new THREE.Mesh(dashGeo, dashMat);
                dash.rotation.x = -Math.PI / 2;
                dash.position.set(0, 0.02, z);
                scene.add(dash);
            }

            // 3. LA VOITURE AVEC SES ROUES
            car = new THREE.Group();
            
            // Carrosserie
            let bodyGeo = new THREE.BoxGeometry(2, 0.6, 4);
            let bodyMat = new THREE.MeshPhongMaterial({ color: '#00f2fe', specular: '#ffffff' });
            let carBody = new THREE.Mesh(bodyGeo, bodyMat);
            carBody.position.y = 0.5;
            car.add(carBody);

            let cabinGeo = new THREE.BoxGeometry(1.6, 0.5, 1.8);
            let cabinMat = new THREE.MeshPhongMaterial({ color: '#090910' });
            let cabin = new THREE.Mesh(cabinGeo, cabinMat);
            cabin.position.set(0, 0.9, -0.2);
            car.add(cabin);

            // Ajout des 4 roues (Cylindres noirs)
            let wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.4, 16);
            let wheelMat = new THREE.MeshPhongMaterial({ color: '#0a0a0f' });
            wheelGeo.rotateZ(Math.PI / 2); // Coucher le cylindre pour en faire une roue

            let wheelPositions = [
                [-1.1, 0.4, 1.2],  // Avant Gauche
                [1.1, 0.4, 1.2],   // Avant Droite
                [-1.1, 0.4, -1.2], // Arrière Gauche
                [1.1, 0.4, -1.2]   // Arrière Droite
            ];

            wheelPositions.forEach(pos => {
                let wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(pos[0], pos[1], pos[2]);
                car.add(wheel);
            });

            scene.add(car);
            car.position.set(0, 0, 0);

            // 4. CRÉATION DES IMMEUBLES ALIGNÉS SUR LES BORDURES
            obstacles = [];
            for (let i = 0; i < 80; i++) {
                let h = Math.random() * 40 + 15;
                let w = Math.random() * 12 + 8;
                
                let obsGeo = new THREE.BoxGeometry(w, h, w);
                let neonColor = Math.random() > 0.5 ? '#ff007f' : '#00f2fe';
                let obsMat = new THREE.MeshPhongMaterial({ color: '#08080f', emissive: neonColor, emissiveIntensity: 0.15 });
                let building = new THREE.Mesh(obsGeo, obsMat);
                
                // Positionnement : soit à gauche de la route (<-25), soit à droite (>25)
                let side = Math.random() > 0.5 ? 1 : -1;
                let rx = side * (Math.random() * 50 + 26); 
                let rz = (Math.random() - 0.5) * 1800; // Répartis sur toute la longueur

                building.position.set(rx, h/2, rz);
                scene.add(building);

                // On stocke les données de l'immeuble pour gérer les collisions
                obstacles.push({
                    x: rx,
                    z: rz,
                    halfW: w / 2,
                    halfD: w / 2
                });
            }

            animate();
        }

        function checkCollisions() {
            // Rayon/Taille de sécurité autour du centre de la voiture
            let carHalfW = physics.width / 2;
            let carHalfL = physics.length / 2;

            obstacles.forEach(obs => {
                // Algorithme AABB (Vérification si les boîtes se touchent)
                if (Math.abs(car.position.x - obs.x) < (carHalfW + obs.halfW) &&
                    Math.abs(car.position.z - obs.z) < (carHalfL + obs.halfD)) {
                    
                    // COLLISION DÉTECTÉE !
                    // 1. On inverse et réduit la vitesse (effet de choc/rebond)
                    physics.speed = -physics.speed * 0.4;

                    // 2. On repousse légèrement la voiture en arrière pour éviter qu'elle reste coincée dans le mur
                    car.position.x -= Math.sin(physics.angle) * 0.6;
                    car.position.z -= Math.cos(physics.angle) * 0.6;
                }
            });
        }

        function updatePhysics() {
            if (keys['ArrowUp']) {
                if (physics.speed < physics.maxSpeed) physics.speed += physics.accel;
            } else if (keys['ArrowDown']) {
                if (physics.speed > physics.backSpeed) physics.speed -= physics.accel;
            } else {
                if (physics.speed > 0) physics.speed -= physics.friction;
                if (physics.speed < 0) physics.speed += physics.friction;
                if (Math.abs(physics.speed) < 0.005) physics.speed = 0;
            }

            if (Math.abs(physics.speed) > 0.02) {
                const currentTurn = physics.speed > 0 ? physics.turnSpeed : -physics.turnSpeed;
                if (keys['ArrowLeft']) physics.angle += currentTurn;
                if (keys['ArrowRight']) physics.angle -= currentTurn;
            }

            // Déplacement
            car.position.x += Math.sin(physics.angle) * physics.speed;
            car.position.z += Math.cos(physics.angle) * physics.speed;
            car.rotation.y = physics.angle;

            // Lancement de la vérification des murs
            checkCollisions();

            // Vitesse affichée à l'écran
            document.getElementById('speed-display').innerText = Math.round(Math.abs(physics.speed) * 220);
        }

        function updateCamera() {
            const backX = car.position.x - Math.sin(physics.angle) * 12;
            const backZ = car.position.z - Math.cos(physics.angle) * 12;
            const targetY = car.position.y + 3.5;

            camera.position.x += (backX - camera.position.x) * 0.08;
            camera.position.z += (backZ - camera.position.z) * 0.08;
            camera.position.y += (targetY - camera.position.y) * 0.08;

            camera.lookAt(new THREE.Vector3(car.position.x, car.position.y + 0.8, car.position.z));
        }

        function animate() {
            gameLoopId = requestAnimationFrame(animate);
            updatePhysics();
            updateCamera();
            renderer.render(scene, camera);
        }

        function stopGame() {
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            switchScreen('main-menu');
        }
    </script>
</body>
</html>
